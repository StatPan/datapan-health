services:
  gatus:
    image: ghcr.io/twin/gatus:v5.36.0@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0
    ports:
      - "8080:8080"
    environment:
      GATUS_TOKEN: ${GATUS_TOKEN:-local-synthetic-token}
      GATUS_DATABASE_URL: ${GATUS_DATABASE_URL:-postgres://datapan_health:local-dev-only@postgres:5432/datapan_health?sslmode=disable}
      GATUS_INCIDENT_WEBHOOK_URL: ${GATUS_INCIDENT_WEBHOOK_URL:-http://gatus:8080/health}
    volumes:
      - ./config/gatus.yaml:/config/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.5-alpine@sha256:ec68817297c5984a00c85c9e3bbd88079d0217284f1a3f0525603a6f9b883916
    environment:
      POSTGRES_DB: datapan_health
      POSTGRES_USER: datapan_health
      POSTGRES_PASSWORD: local-dev-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapan_health -d datapan_health"]
      interval: 2s
      timeout: 2s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  runner-healthy:
    profiles: ["fixtures"]
    build:
      context: .
    environment:
      GATUS_URL: http://gatus:8080
      GATUS_TOKEN: ${GATUS_TOKEN:-local-synthetic-token}
      RECEIPT_ARCHIVE: /data/receipts.jsonl
      CANARY_CONFIG: /config/canaries.json
    volumes:
      - ./testdata:/fixtures:ro
      - ./config:/config:ro
      - receipt-data:/data
    command: ["-receipt", "/fixtures/receipts/v1/healthy.json"]
    depends_on:
      gatus:
        condition: service_started

  runner-unhealthy:
    profiles: ["fixtures"]
    build:
      context: .
    environment:
      GATUS_URL: http://gatus:8080
      GATUS_TOKEN: ${GATUS_TOKEN:-local-synthetic-token}
      RECEIPT_ARCHIVE: /data/receipts.jsonl
      CANARY_CONFIG: /config/canaries.json
    volumes:
      - ./testdata:/fixtures:ro
      - ./config:/config:ro
      - receipt-data:/data
    command: ["-receipt", "/fixtures/receipts/v1/unhealthy.json"]
    depends_on:
      gatus:
        condition: service_started

  scheduler:
    profiles: ["scheduler"]
    build:
      context: .
    entrypoint: ["/health-scheduler"]
    environment:
      CANARY_CONFIG: /config/canaries.json
      SCHEDULER_STATE: /data/scheduler-state.json
      # Local smoke deliberately has no CLI credentials or executable. It only
      # checks startup/readiness; it can never call a real provider.
      DATAPAN_BIN: /not-a-cli
      HEALTH_RUNNER_BIN: /health-runner
    volumes:
      - ./config:/config:ro
      - scheduler-data:/data
    ports:
      - "8081:8081"

  public-status:
    profiles: ["public-status"]
    build:
      context: .
    entrypoint: ["/health-public"]
    environment:
      CANARY_CONFIG: /config/canaries.json
      GATUS_STATUS_URL: http://gatus:8080/api/v1/endpoints/statuses
      PUBLIC_STATUS_ALLOWED_ORIGINS: https://datapan.statpan.com
    volumes:
      - ./config:/config:ro
    ports:
      - "8082:8082"
    depends_on:
      gatus:
        condition: service_started

volumes:
  receipt-data:
  scheduler-data:
