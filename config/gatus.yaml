web:
  port: 8080

storage:
  type: postgres
  path: "${GATUS_DATABASE_URL}"
  # Seven days at the fastest supported cadence (5 minutes): 12 * 24 * 7.
  maximum-number-of-results: 2016
  # Events are state transitions, not raw observations; retain a bounded window.
  maximum-number-of-events: 100

alerting:
  custom:
    # Production injects the platform incident receiver; local Compose uses a non-secret sink.
    url: "${GATUS_INCIDENT_WEBHOOK_URL}"
    method: POST

ui:
  title: Datapan 상태
  header: Datapan
  dashboard-heading: 공공데이터 API 상태
  dashboard-subheading: API가 평소와 다르게 보이면 먼저 여기에서 상태를 확인하세요.
  description: Datapan이 확인한 공공데이터 API의 현재 상태입니다.
  logo: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='10' fill='%232563eb'/%3E%3Cpath d='M11 12h8c7 0 11 3 11 8s-4 8-11 8h-8V12zm7 5v6h2c3 0 5-1 5-3s-2-3-5-3h-2z' fill='white'/%3E%3C/svg%3E"
  link: https://datapan.dev
  dark-mode: false
  default-sort-by: name
  custom-css: |
    :root { --datapan-blue: #2563eb; }
    body { background: #f8fafc; }
    main, .container { max-width: 760px !important; margin-inline: auto !important; }
    .dashboard-container .grid.gap-3 { grid-template-columns: minmax(0, 1fr) !important; }
    h1, h2 { letter-spacing: -0.025em; }
    a:focus-visible, button:focus-visible { outline: 3px solid var(--datapan-blue); outline-offset: 3px; }

# Gatus requires one native endpoint even when all product checks are pushed.
endpoints:
  - name: Datapan 상태 페이지
    group: 시스템
    url: http://127.0.0.1:8080/health
    interval: 1m
    conditions:
      - "[STATUS] == 200"

external-endpoints:
  - name: kosis-population
    group: public-data
    token: "${GATUS_TOKEN}"
    heartbeat:
      interval: 10m
    alerts:
      - type: custom
        description: public API canary incident
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
  - name: data-go-kr-weather
    group: public-data
    token: "${GATUS_TOKEN}"
    heartbeat:
      interval: 20m
    alerts:
      - type: custom
        description: public API canary incident
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
  - name: ecos-key-statistics
    group: public-data
    token: "${GATUS_TOKEN}"
    heartbeat:
      interval: 30m
    alerts:
      - type: custom
        description: public API canary incident
        failure-threshold: 2
        success-threshold: 2
        send-on-resolved: true
